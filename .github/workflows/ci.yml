name: Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            g++ make libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxext-dev \
            libasound2-dev libpulse-dev cmake

      - name: Cache raylib
        id: cache-raylib
        uses: actions/cache@v4
        with:
          path: /tmp/raylib-install
          key: raylib-5.5-${{ runner.os }}

      - name: Build raylib from source
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/raylib-install \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_GAMES=OFF
          cmake --build /tmp/raylib/build --parallel
          cmake --install /tmp/raylib/build

      - name: Install raylib
        run: |
          if [ -d /tmp/raylib-install ]; then
            sudo cp -r /tmp/raylib-install/* /usr/local/
          fi

      - name: Build server (oz_server)
        run: make oz_server

      - name: Build client (Angels95)
        run: make OTENGINE

      - name: Build OzPack
        run: make ozpack

      - name: Smoke test server
        run: |
          timeout 3 ./oz_server --dir GameData --port 27015 --http-port 8080 2>&1 | head -20

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: oz_server-linux
          path: oz_server

      - name: Upload client binary
        uses: actions/upload-artifact@v4
        with:
          name: Angels95-linux
          path: Angels95

      - name: Upload OzPack binary
        uses: actions/upload-artifact@v4
        with:
          name: OzPack-linux
          path: OzPack

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-raylib
            make

      - name: Check toolchain
        run: |
          uname -s
          g++ --version | head -1
          make --version | head -1
          pkg-config --cflags --libs raylib 2>/dev/null || echo "pkg-config not used"

      - name: Build server (oz_server)
        run: make oz_server SERVER_CXX=g++

      - name: Build client (Angels95)
        run: make OTENGINE

      - name: Build OzPack
        run: make ozpack

      - name: Build editor (oz_editor)
        run: |
          cd OTEditor
          EDITOR_FLAGS="-O3 -g --std=c++20 -Wno-narrowing"
          EDITOR_INC="-I ../Source -I Source"
          EDITOR_LIBS="-lraylib -lopengl32 -lgdi32 -lwinmm -lcomctl32 -lcomdlg32 -lws2_32 -lm"
          
          g++ -fpermissive $EDITOR_FLAGS $EDITOR_INC -c Source/raygui/raygui.c -DRAYGUI_IMPLEMENTATION -o raygui.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c Source/Main.cpp -o Main.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c Source/Win32Dialogs.cpp -o Win32Dialogs.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/Pawn/OzPawnSystem.cpp -o OzPawnSystem.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/Package/OzAssetMapper.cpp -o OzAssetMapper.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/OzOzoneLoader.cpp -o OzOzoneLoader.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/Server/OzoneParser.cpp -o OzoneParser.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/Server/WDLParser.cpp -o WDLParser.o
          g++ $EDITOR_FLAGS $EDITOR_INC -c ../Source/Log.cpp -o Log.o
          echo 'int main_custom() { return 0; }' | g++ $EDITOR_FLAGS $EDITOR_INC -x c++ -c - -o OTCustom_stub.o
          
          g++ Main.o Win32Dialogs.o OzPawnSystem.o OzAssetMapper.o OzOzoneLoader.o OzoneParser.o WDLParser.o Log.o raygui.o OTCustom_stub.o -o oz_editor.exe $EDITOR_FLAGS $EDITOR_INC $EDITOR_LIBS
          cd ..

      - name: Assemble System/ release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path System | Out-Null
          New-Item -ItemType Directory -Force -Path System/Data | Out-Null
          
          # Move EXEs
          Move-Item -Force Angels95.exe System\
          Move-Item -Force oz_server.exe System\
          Move-Item -Force OzPack.exe System\
          Move-Item -Force OTEditor\oz_editor.exe System\
          
          # Copy DLLs
          Copy-Item /mingw64/bin/libraylib*.dll System\ -ErrorAction SilentlyContinue
          Copy-Item /mingw64/bin/libglfw*.dll System\ -ErrorAction SilentlyContinue
          
          # Create INI files
          @"
          [Video]
          Width=1280
          Height=720
          Fullscreen=0
          VSync=1
          
          [Audio]
          MasterVolume=1.0
          MusicVolume=0.7
          SFXVolume=1.0
          
          [Game]
          ServerIP=127.0.0.1
          ServerPort=27015
          "@ | Set-Content System\Angels95.ini -Encoding UTF8
          
          @"
          [Editor]
          GridSize=1.0
          SnapToGrid=1
          ShowGrid=1
          
          [Video]
          Width=1600
          Height=900
          "@ | Set-Content System\oz_editor.ini -Encoding UTF8
          
          @"
          [Server]
          Port=27015
          HttpPort=8080
          MaxPlayers=16
          WorldDir=GameData
          
          [Game]
          ServerName=Angels95 Server
          "@ | Set-Content System\OzServer.ini -Encoding UTF8
          
          # Create run scripts
          @"
          @echo off
          cd /d "%~dp0.."
          start "" "%~dp0Angels95.exe"
          "@ | Set-Content System\run.bat -Encoding ASCII
          
          @"
          Set-Location -LiteralPath (Split-Path -Parent `$PSScriptRoot)
          & "`$PSScriptRoot\Angels95.exe"
          "@ | Set-Content System\run.ps1 -Encoding UTF8

      - name: Package assets
        shell: pwsh
        run: |
          if (Test-Path .\build-data.ps1) {
            & .\build-data.ps1
          } else {
            Write-Host "build-data.ps1 not found, skipping"
          }

      - name: Verify System/ contents
        shell: pwsh
        run: |
          Write-Host "=== System/ contents ==="
          Get-ChildItem System -Recurse | Select-Object FullName, Length
          
          $required = @("Angels95.exe", "oz_server.exe", "oz_editor.exe", "OzPack.exe")
          $missing = @()
          foreach ($exe in $required) {
            if (-not (Test-Path "System\$exe")) { $missing += $exe }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing EXEs: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required EXEs present"

      - name: Upload System/ release
        uses: actions/upload-artifact@v4
        with:
          name: System-windows
          path: System/
          retention-days: 30

      - name: Upload individual binaries (legacy)
        uses: actions/upload-artifact@v4
        with:
          name: Angels95-windows
          path: |
            Angels95.exe
            libraylib*.dll
            libglfw*.dll
          if-no-files-found: ignore
