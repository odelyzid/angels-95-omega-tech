name: Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            g++ make libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxext-dev \
            libasound2-dev libpulse-dev cmake

      - name: Build raylib from source
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_GAMES=OFF
          cmake --build /tmp/raylib/build --parallel
          sudo cmake --install /tmp/raylib/build

      - name: Build server (oz_server)
        run: make oz_server

      - name: Build client (OmegaTech)
        run: make OTENGINE

      - name: Smoke test server
        run: |
          timeout 3 ./oz_server --dir GameData --port 27015 --http-port 8080 2>&1 | head -20

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: oz_server-linux
          path: oz_server

      - name: Upload client binary
        uses: actions/upload-artifact@v4
        with:
          name: OmegaTech-linux
          path: OmegaTech

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-raylib
            mingw-w64-x86_64-pkg-config
            make

      - name: Build server (oz_server)
        run: |
          make oz_server

      - name: Build client (OmegaTech)
        run: |
          make OTENGINE

      - name: Smoke test server (syntax check only)
        run: |
          ls -la oz_server.exe 2>/dev/null || ls -la oz_server 2>/dev/null
          echo "Build successful"

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: oz_server-windows
          path: oz_server*

      - name: Upload client binary
        uses: actions/upload-artifact@v4
        with:
          name: OmegaTech-windows
          path: OmegaTech.exe
